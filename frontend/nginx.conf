# Frontend nginx — serves the React build and reverse-proxies the API.
#
# In docker-compose the backend service is reachable at the hostname
# `backend` (Compose's service name). Proxying `/api/` here means the
# browser sees a single origin (http://localhost:8080) and never trips
# CORS, which is the most common cause of "Network Error" in the UI.

upstream ims_backend {
    server backend:8000;
}

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # ----- Long-cache hashed asset bundles produced by CRA ---------------
    location /static/ {
        expires 1y;
        access_log off;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # ----- API reverse proxy --------------------------------------------
    # Forwards every /api/* call to the FastAPI container and rewrites the
    # path so FastAPI sees the request at its expected /api/v1/* location.
    location /api/ {
        proxy_pass         http://ims_backend;
        proxy_http_version 1.1;

        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Connection        "";

        # Don't buffer streaming responses (e.g. SSE) and don't time out
        # long-running requests prematurely.
        proxy_buffering    off;
        proxy_read_timeout 300s;
    }

    # ----- Health endpoint (used by the compose healthcheck) -----------
    location = /healthz {
        access_log off;
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }

    # ----- SPA fallback -------------------------------------------------
    # Every other path serves index.html so React Router works.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ----- Security headers --------------------------------------------
    add_header X-Content-Type-Options nosniff;
    add_header X-Frame-Options DENY;
    add_header Referrer-Policy strict-origin-when-cross-origin;
}